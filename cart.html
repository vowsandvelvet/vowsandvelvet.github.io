<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vows & Velvet Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap" rel="stylesheet">

<style>
body{
  background:black;
  color:gold;
  font-family:'Tangerine',cursive;
  margin:0;
  text-align:center;
}
h1{font-size:70px;margin-top:40px;}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:30px;
  padding:50px;
}
.product{
  border:1px solid gold;
  padding:20px;
  border-radius:10px;
}
.product img{
  width:100%;
  border-radius:10px;
}
button{
  background:gold;
  border:none;
  padding:10px 20px;
  margin-top:10px;
  cursor:pointer;
  font-size:18px;
  border-radius:5px;
}
.checkout{margin-top:40px;}
</style>
</head>

<body>

<h1>Your Sanctuary Cart</h1>

<!-- PRODUCTS CONTAINER -->
<div class="products" id="product-list"></div>

<!-- CART TOTAL AND CHECKOUT -->
<div class="checkout">
<h2>Total: ₦<span id="total">0</span></h2>
<a href="checkout.html"><button>Proceed to Checkout</button></a>
</div>

<!-- RETURN TO HOME -->
<a href="index.html"><button>Return to Home</button></a>

<script>
// ------------------------
// PRODUCTS DATABASE
// ------------------------
const products = [
  {name:"Signature Bridal Kit", price:120000, img:"https://source.unsplash.com/400x300/?wedding,kit"},
  {name:"Velvet Bliss Kit", price:140000, img:"https://source.unsplash.com/400x300/?luxury,beauty,kit"},
  {name:"Rose Gold Rescue Kit", price:110000, img:"https://source.unsplash.com/400x300/?wedding,essentials"}
];

// ------------------------
// LOAD CART
// ------------------------
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ------------------------
// DISPLAY PRODUCTS
// ------------------------
const productContainer = document.getElementById("product-list");

products.forEach((p, index)=>{
  const div = document.createElement("div");
  div.className="product";
  div.innerHTML = `
    <img src="${p.img}" alt="${p.name}">
    <h2>${p.name}</h2>
    <p>₦${p.price}</p>
    <button onclick="addItem(${index})">Add to Cart</button>
  `;
  productContainer.appendChild(div);
});

// ------------------------
// UPDATE TOTAL
// ------------------------
function updateTotal(){
  let total = cart.reduce((sum, item)=>sum + item.price, 0);
  document.getElementById("total").innerText = total;
}

// ------------------------
// ADD ITEM TO CART
// ------------------------
function addItem(index){
  cart.push(products[index]);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateTotal();
  alert(`${products[index].name} added to cart`);
}

// ------------------------
// INITIAL TOTAL DISPLAY
// ------------------------
updateTotal();
</script>

</body>
</html>
